<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - E-Shop</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .admin-container { display: flex; min-height: 80vh; margin-top: 2rem; gap: 2rem; }
        .sidebar { width: 250px; background: var(--card-bg); padding: 1.5rem; border-radius: 12px; }
        .sidebar ul { list-style: none; }
        .sidebar li { margin-bottom: 1rem; cursor: pointer; padding: 0.75rem; border-radius: 6px; transition: background var(--transition-fast); font-weight: 600; }
        .sidebar li:hover, .sidebar li.active { background: var(--primary-color); color: white; }
        .content { flex: 1; background: var(--card-bg); padding: 2rem; border-radius: 12px; overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: var(--text-secondary); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.05em; }
        tr:hover td { background-color: rgba(255,255,255,0.02); }
        
        #login-section { max-width: 400px; margin: 6rem auto; background: var(--card-bg); padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        #login-section h2 { margin-bottom: 1.5rem; text-align: center; }
        .input-group { margin-bottom: 1rem; }
        input { width: 100%; padding: 0.85rem; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-family: inherit; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: var(--primary-color); }
        
        .badge-status { padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }
        .status-success { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .status-failed { background: rgba(239, 68, 68, 0.2); color: #f87171; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
            <h1 class="logo">E-Shop Admin.</h1>
            <a href="index.html" style="color:var(--text-secondary); text-decoration:none; font-weight: 600; transition: color 0.2s;">Volver a la tienda &rarr;</a>
        </div>
    </header>

    <main class="container">
        <!-- Login Section -->
        <div id="login-section">
            <h2>Iniciar Sesión</h2>
            <div class="input-group">
                <input type="text" id="username" placeholder="Usuario (admin)">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Contraseña (admin123)">
            </div>
            <button id="login-btn" class="btn-primary" style="margin-top: 1rem;">Ingresar al Panel</button>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="admin-container hidden">
            <aside class="sidebar">
                <ul>
                    <li class="active" id="tab-products">📦 Productos</li>
                    <li id="tab-orders">🛒 Pedidos</li>
                    <li id="logout-btn" style="color: var(--danger-color); margin-top: 2rem;">🚪 Cerrar Sesión</li>
                </ul>
            </aside>
            <section class="content">
                <div id="view-products">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h2>Gestión de Productos</h2>
                        <button class="btn-primary" style="width:auto; padding: 0.5rem 1.25rem;">+ Nuevo Producto</button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="admin-products-table">
                            <!-- JS will inject products here -->
                        </tbody>
                    </table>
                </div>

                <div id="view-orders" class="hidden">
                    <h2>Últimos Pedidos</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Cliente</th>
                                <th>Total</th>
                                <th>Estado</th>
                                <th>Pagado Vía</th>
                            </tr>
                        </thead>
                        <tbody id="admin-orders-table">
                            <!-- JS will inject orders here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <div id="toast" class="toast hidden"></div>
    <script src="js/admin.js" type="module"></script>
</body>
</html>
